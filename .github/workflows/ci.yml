name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: QaaS.Common.Assertions.sln
  PROJECT_TO_PACK: QaaS.Common.Assertions/QaaS.Common.Assertions.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --maxcpucount

      # --- DEPLOYMENT STEPS (Run only on tags) ---

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        uses: battila7/get-version-action@v2

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Error: '$VERSION' is not a valid version."
            exit 1
          fi

      - name: Validate package metadata
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $projectPath = "${{ env.PROJECT_TO_PACK }}"
          [xml]$project = Get-Content $projectPath
          $propertyGroups = @($project.Project.PropertyGroup)

          function Get-PropertyValue([string]$name) {
            foreach ($group in $propertyGroups) {
              $value = $group.$name
              if ($null -ne $value -and "$value".Trim() -ne "") {
                return "$value".Trim()
              }
            }
            return $null
          }

          $packageId = Get-PropertyValue "PackageId"
          $isPackable = (Get-PropertyValue "IsPackable")
          $description = Get-PropertyValue "Description"
          $packageReadmeFile = Get-PropertyValue "PackageReadmeFile"
          $includeSymbols = Get-PropertyValue "IncludeSymbols"
          $symbolPackageFormat = Get-PropertyValue "SymbolPackageFormat"

          if ($isPackable -and $isPackable.ToLowerInvariant() -eq "false") {
            throw "Project '$projectPath' is not packable."
          }
          if ([string]::IsNullOrWhiteSpace($description)) {
            throw "Project '$projectPath' must define Description for NuGet package publishing."
          }
          if ($packageReadmeFile -ne "README.md") {
            throw "Project '$projectPath' must set PackageReadmeFile=README.md."
          }
          if ($includeSymbols.ToLowerInvariant() -ne "true") {
            throw "Project '$projectPath' must set IncludeSymbols=true."
          }
          if ($symbolPackageFormat -ne "snupkg") {
            throw "Project '$projectPath' must set SymbolPackageFormat=snupkg."
          }

          $noneItems = @()
          foreach ($itemGroup in @($project.Project.ItemGroup)) {
            if ($itemGroup.None) {
              $noneItems += @($itemGroup.None)
            }
          }

          $readmePackItem = $noneItems |
            Where-Object { $_.Link -eq "README.md" -and $_.Pack -eq "true" } |
            Select-Object -First 1

          if (-not $readmePackItem) {
            throw "Project '$projectPath' must pack the repository README as README.md."
          }

          Write-Host "Validated package metadata for package '$packageId'."

      - name: Pack QaaS.Common.Assertions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.version.outputs.version-without-v }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push QaaS.Common.Assertions to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $mainPackages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Common.Assertions.*.nupkg" `
            | Where-Object { $_.Name -match "^QaaS\.Common\.Assertions\.[0-9].*\.nupkg$" }
          $symbolPackages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Common.Assertions.*.snupkg" `
            | Where-Object { $_.Name -match "^QaaS\.Common\.Assertions\.[0-9].*\.snupkg$" }

          if (-not $mainPackages) {
            throw "No main package was produced for publishing."
          }
          if (-not $symbolPackages) {
            throw "No .snupkg symbol package was produced for publishing."
          }

          foreach ($package in $mainPackages) {
            dotnet nuget push $package.FullName `
              -k ${{ secrets.NUGET_AUTH_TOKEN }} `
              -s https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

          foreach ($symbolPackage in $symbolPackages) {
            dotnet nuget push $symbolPackage.FullName `
              -k ${{ secrets.NUGET_AUTH_TOKEN }} `
              -s https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

